<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET AND POST</title>
</head>
<body>
    <h3>GET Request Form</h3>
    <form method="get" action="http://localhost:8000/register">
        <input placeholder="enter username" name="username" type="text"/>
        <input placeholder="enter password" name="password" type="password"/>
        <button type="submit">Submit</button>
    </form>

    <hr>

    <h3>POST Request Form</h3>
    <form method="post" action="http://localhost:8000/register">
        <input placeholder="enter username" name="username" type="text"/>
        <input placeholder="enter password" name="password" type="password"/>
        <button type="submit">Submit</button>
    </form>
      
   

    
</body>
</html>
